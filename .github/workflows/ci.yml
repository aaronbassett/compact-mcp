name: ci
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.90
        with: { components: rustfmt, clippy }
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets --locked --features testing -- -D warnings
      - run: cargo test --workspace --locked --features testing
      - name: core must not depend on rmcp
        run: |
          # Write to a file first: piping straight into grep makes a `cargo tree`
          # failure indistinguishable from "no rmcp found", so the gate would
          # silently pass when the tool itself broke.
          cargo tree -p compact-mcp-core --prefix none > core-tree.txt
          if grep -qx 'rmcp v.*' core-tree.txt; then
            echo "::error::compact-mcp-core must not depend on rmcp"; exit 1
          fi

  toolchain:
    # Tests that shell out to a real `compact`. Kept separate so the fast job
    # above stays hermetic.
    runs-on: ubuntu-latest
    env:
      COMPACT_VERSION: "0.31.1"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.90
      - uses: Swatinem/rust-cache@v2
      - name: install the compact CLI
        run: |
          curl --proto '=https' --tlsv1.2 -LsSf https://github.com/midnightntwrk/compact/releases/latest/download/compact-installer.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: install a pinned compiler
        run: compact update "$COMPACT_VERSION"
      - run: cargo test --workspace --locked --features "toolchain-tests testing"
